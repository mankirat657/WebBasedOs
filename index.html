<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CusOs - welcome to broswer based os</title>
    <link rel="icon" type="image/x-icon" href="/images/vero.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

   
   <div class="window">
    
   </div>
   
    <div id="taskbar">
        <div class="startMenuGroup">
            <div class="startMenuWrapper">
                <div class="startMenu">
                    <i class="fa-brands fa-windows" style="color: rgb(116, 192, 252);"></i>
                </div>
            </div>
            <div id="searchBar">
               <i class="fa-brands fa-sistrix" style="color: rgb(116, 192, 252);"></i>
                <input type="text" placeholder="Type here to search">
            </div>
        </div>
        <div class="rightTaskbar">
            <div class="weatherReports">
                 <i class="fa-solid fa-moon" style="color: rgb(255, 212, 59);"></i>
                 <p>25°C</p>
                 <p>Clear</p>
            </div>
            <div class="systemFeatures">
               <i class="fa-solid fa-angle-up" style="color: rgb(116, 192, 252);"></i>
               <i class="fa-solid fa-battery-full" style="color: rgb(116, 192, 252);"></i>
               <i class="fa-solid fa-volume-high" style="color: rgb(116, 192, 252);"></i>
               <p>ENG</p>
            </div>
            <div class="dateAndTime">
              <div class="dateTimeData">
                    <p>
                        22:14
                    </p>
                    <p>02-04-2026</p>
              </div>
              <i class="fa-solid fa-house-circle-exclamation" style="color: rgb(116, 192, 252);"></i>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</body>

</html>
